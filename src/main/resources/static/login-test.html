<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회원 API 전체 흐름 테스트</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { font-family: sans-serif; max-width: 860px; margin: 30px auto; padding: 0 16px; }
        .step { border: 1px solid #ddd; border-radius: 10px; padding: 14px 16px; margin: 12px 0; }
        .step h3 { margin: 0 0 8px; font-size: 16px; }
        button { padding: 8px 14px; border-radius: 6px; border: 1px solid #888; background: #fff; cursor: pointer; }
        button:hover { background: #f0f0f0; }
        .kakao { background: #FEE500; border-color: #FEE500; font-weight: bold; }
        .naver { background: #03C75A; border-color: #03C75A; color: #fff; font-weight: bold; }
        pre { background: #f6f6f6; padding: 10px; border-radius: 8px; white-space: pre-wrap; word-break: break-all; min-height: 18px; margin: 8px 0 0; font-size: 12px; }
        .ok { border-left: 4px solid #0a7d33; } .err { border-left: 4px solid #c0392b; }
        input { padding: 6px 8px; border: 1px solid #aaa; border-radius: 6px; }
        #state { font-size: 12px; color: #555; }
        .login-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
    </style>
</head>
<body>
<h2>경주ON — 회원 API 전체 흐름 테스트</h2>
<p id="state">상태: 로그인 전</p>

<div class="step">
    <h3>1) 소셜 로그인 — POST /api/members/login</h3>
    <div class="login-row">
        <div>
            <div id="g_id_onload"
                 data-client_id="175775527064-qqchhb8pelcl3555lsf2erql3icu1qk1.apps.googleusercontent.com"
                 data-callback="onGoogleCredential"
                 data-auto_prompt="false"></div>
            <div class="g_id_signin" data-type="standard" data-size="large" data-text="signin_with"></div>
        </div>
        <button class="kakao" onclick="kakaoLogin()">카카오로 로그인</button>
        <button class="naver" onclick="naverLogin()">네이버로 로그인</button>
    </div>
    <pre id="r1">-</pre>
</div>

<div class="step">
    <h3>2) 닉네임 중복 확인 — GET /api/members/check-nickname</h3>
    <input id="nickname" value="">
    <button id="btn2" onclick="checkNickname()">중복 확인</button>
    <pre id="r2">-</pre>
</div>

<div class="step">
    <h3>3) 추가 정보 등록 — PATCH /api/members/extra-info</h3>
    <button id="btn3" onclick="extraInfo()">닉네임 등록 (난이도 EASY)</button>
    <pre id="r3">-</pre>
</div>

<div class="step">
    <h3>4) 토큰 재발급 — POST /api/members/reissue</h3>
    <button id="btn4" onclick="reissue()">재발급</button>
    <pre id="r4">-</pre>
</div>

<div class="step">
    <h3>5) 로그아웃 — POST /api/members/logout</h3>
    <button id="btn5" onclick="logout()">로그아웃</button>
    <button onclick="reissue('r5b')">로그아웃 후 재발급 시도 (실패해야 정상)</button>
    <pre id="r5">-</pre>
    <pre id="r5b">-</pre>
</div>

<div class="step">
    <h3>6) 회원 탈퇴 — DELETE /api/members</h3>
    <button id="btn6" onclick="withdraw()">탈퇴 (soft delete)</button>
    <pre id="r6">-</pre>
</div>

<script>
    const KAKAO_REST_KEY = 'a91e0513711855746995110c489dab88';
    const NAVER_CLIENT_ID = '1HXmSrlcHuA_sjTDKEwl';
    const REDIRECT_URI = window.location.origin + '/login-test.html';

    let accessToken = null;
    let refreshToken = null;

    document.getElementById('nickname').value = '테스터' + Math.floor(Math.random() * 100000);

    function show(id, status, json) {
        const el = document.getElementById(id);
        el.textContent = 'HTTP ' + status + '\n' + JSON.stringify(json, null, 2);
        el.className = (status >= 200 && status < 300) ? 'ok' : 'err';
    }

    function setState(msg) { document.getElementById('state').textContent = '상태: ' + msg; }

    async function call(method, url, body, useAuth) {
        const headers = { 'Content-Type': 'application/json' };
        if (useAuth && accessToken) headers['Authorization'] = 'Bearer ' + accessToken;
        const res = await fetch(url, { method, headers, body: body ? JSON.stringify(body) : undefined });
        return { status: res.status, json: await res.json() };
    }

    async function doLogin(provider, body) {
        const r = await call('POST', '/api/members/login', body);
        show('r1', r.status, r.json);
        if (r.json.data) {
            accessToken = r.json.data.accessToken;
            refreshToken = r.json.data.refreshToken;
            setState(provider + ' 로그인됨 (memberId=' + r.json.data.memberId + ', isNewMember=' + r.json.data.isNewMember + ')');
        }
    }

    // ===== Google =====
    async function onGoogleCredential(response) {
        await doLogin('GOOGLE', { provider: 'GOOGLE', idToken: response.credential });
    }

    // ===== Kakao (인가 코드 → 토큰 교환) =====
    function kakaoLogin() {
        const url = 'https://kauth.kakao.com/oauth/authorize'
            + '?client_id=' + KAKAO_REST_KEY
            + '&redirect_uri=' + encodeURIComponent(REDIRECT_URI)
            + '&response_type=code'
            + '&state=kakao';
        window.location.href = url;
    }

    async function handleKakaoCode(code) {
        setState('카카오 토큰 교환 중...');
        try {
            const res = await fetch('https://kauth.kakao.com/oauth/token', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded;charset=utf-8' },
                body: new URLSearchParams({
                    grant_type: 'authorization_code',
                    client_id: KAKAO_REST_KEY,
                    redirect_uri: REDIRECT_URI,
                    code: code
                })
            });
            const token = await res.json();
            if (!token.access_token) {
                show('r1', res.status, token);
                setState('카카오 토큰 교환 실패');
                return;
            }
            await doLogin('KAKAO', { provider: 'KAKAO', accessToken: token.access_token });
        } catch (e) {
            document.getElementById('r1').textContent = '카카오 토큰 교환 오류: ' + e;
            document.getElementById('r1').className = 'err';
        }
    }

    // ===== Naver (implicit — access_token 즉시 발급) =====
    function naverLogin() {
        const url = 'https://nid.naver.com/oauth2.0/authorize'
            + '?response_type=token'
            + '&client_id=' + NAVER_CLIENT_ID
            + '&redirect_uri=' + encodeURIComponent(REDIRECT_URI)
            + '&state=naver' + Math.random().toString(36).slice(2);
        window.location.href = url;
    }

    // ===== 리다이렉트 복귀 처리 =====
    window.addEventListener('load', () => {
        // Kakao: ?code=... 로 복귀
        const params = new URLSearchParams(window.location.search);
        if (params.get('code') && params.get('state') === 'kakao') {
            const code = params.get('code');
            history.replaceState(null, '', REDIRECT_URI);
            handleKakaoCode(code);
            return;
        }
        // Naver: #access_token=... 으로 복귀
        if (window.location.hash.includes('access_token')) {
            const hash = new URLSearchParams(window.location.hash.substring(1));
            const naverToken = hash.get('access_token');
            history.replaceState(null, '', REDIRECT_URI);
            if (naverToken) doLogin('NAVER', { provider: 'NAVER', accessToken: naverToken });
        }
    });

    // ===== 이후 단계 =====
    async function checkNickname() {
        const n = document.getElementById('nickname').value;
        const r = await call('GET', '/api/members/check-nickname?nickname=' + encodeURIComponent(n));
        show('r2', r.status, r.json);
    }

    async function extraInfo() {
        const n = document.getElementById('nickname').value;
        const r = await call('PATCH', '/api/members/extra-info', { nickname: n, difficulty: 'EASY' }, true);
        show('r3', r.status, r.json);
    }

    async function reissue(target) {
        const r = await call('POST', '/api/members/reissue', { refreshToken: refreshToken });
        show(target || 'r4', r.status, r.json);
        if (!target && r.json.data) {
            accessToken = r.json.data.accessToken;
            refreshToken = r.json.data.refreshToken;
            setState('토큰 재발급됨');
        }
    }

    async function logout() {
        const r = await call('POST', '/api/members/logout', null, true);
        show('r5', r.status, r.json);
        if (r.status === 200) setState('로그아웃됨 (accessToken은 만료 전까지 유효)');
    }

    async function withdraw() {
        const r = await call('DELETE', '/api/members', null, true);
        show('r6', r.status, r.json);
        if (r.status === 200) setState('탈퇴 완료');
    }
</script>
</body>
</html>
